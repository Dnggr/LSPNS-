<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LSPNS Admin Portal</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Leaflet map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; font-size: 14px; }
  
  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-card { background: #fff; padding: 32px; border-radius: 12px; width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .auth-card h1 { font-size: 20px; margin-bottom: 4px; }
  .auth-card p { color: #64748b; margin-bottom: 24px; font-size: 13px; }

  /* LAYOUT */
  #app { display: none; }
  header { background: #0f766e; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; font-weight: 600; }
  main { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 48px); }

  /* SIDEBAR */
  #sidebar { background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
  #filters { padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 6px; flex-wrap: wrap; }
  #filters select, #filters button { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; background: #fff; font-size: 13px; }
  #filters button.active { background: #0f766e; color: #fff; border-color: #0f766e; }
  #report-list { flex: 1; overflow-y: auto; }

  /* REPORT CARDS */
  .report-card { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background .15s; }
  .report-card:hover { background: #f8fafc; }
  .report-card.selected { background: #f0fdfa; border-left: 3px solid #0f766e; }
  .report-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .report-card-type { font-weight: 600; font-size: 13px; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-in_progress { background: #dbeafe; color: #1e40af; }
  .badge-resolved { background: #d1fae5; color: #065f46; }
  .report-card-desc { color: #64748b; font-size: 12px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .report-card-date { color: #94a3b8; font-size: 11px; }

  /* MAP */
  #map { height: 100%; z-index: 0; }

  /* DETAIL PANEL */
  #detail-panel { display: none; position: absolute; top: 48px; right: 0; width: 340px; height: calc(100vh - 48px); background: #fff; border-left: 1px solid #e2e8f0; overflow-y: auto; z-index: 1000; padding: 16px; }
  #detail-panel.open { display: block; }
  #detail-panel h2 { font-size: 15px; margin-bottom: 12px; }
  .detail-row { margin-bottom: 10px; }
  .detail-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .detail-val { font-size: 13px; }
  .detail-photo { width: 100%; border-radius: 8px; margin-bottom: 12px; max-height: 200px; object-fit: cover; }
  .status-btn { padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-right: 6px; margin-bottom: 6px; }
  .btn-pending { background: #fef3c7; color: #92400e; }
  .btn-in_progress { background: #dbeafe; color: #1e40af; }
  .btn-resolved { background: #d1fae5; color: #065f46; }
  .btn-active { outline: 2px solid #0f766e; }
  .log-item { padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
  .log-arrow { font-weight: 600; color: #0f766e; }
  .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; color: #64748b; }

  /* FORMS */
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
  .btn { width: 100%; padding: 10px; background: #0f766e; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: .6; cursor: default; }
  .error { color: #dc2626; font-size: 13px; margin-bottom: 8px; }
  .empty { padding: 32px; text-align: center; color: #94a3b8; }

  /* COUNTS */
  #counts { padding: 8px 14px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; font-size: 12px; }
  .count-item { display: flex; align-items: center; gap: 4px; }
  .count-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>LSPNS Admin</h1>
    <p>Barangay Quarry — Official Portal</p>
    <input id="email" type="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <p class="error" id="auth-error" style="display:none"></p>
    <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>LSPNS — Admin Dashboard</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="user-email" style="font-size:13px;opacity:.85"></span>
      <button onclick="doLogout()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:13px;">Logout</button>
    </div>
  </header>

  <main>
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="filters">
        <select id="status-filter" onchange="applyFilter()">
          <option value="all">All statuses</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
        </select>
        <select id="type-filter" onchange="applyFilter()">
          <option value="all">All types</option>
          <option value="street_light">Street Light</option>
          <option value="road_damage">Road Damage</option>
          <option value="hazard">Hazard</option>
          <option value="announcement">Announcement</option>
        </select>
        <button onclick="loadReports()" title="Refresh">↻ Refresh</button>
      </div>
      <div id="counts"></div>
      <div id="report-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- MAP -->
    <div id="map"></div>
  </main>

  <!-- DETAIL PANEL -->
  <div id="detail-panel">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ── CONFIG — REPLACE THESE ─────────────────────────────────────
const SUPABASE_URL = 'https://xygqmlymgfhsevskldlm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5Z3FtbHltZ2Zoc2V2c2tsZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDg0NzEsImV4cCI6MjA5MjA4NDQ3MX0.Qn_IVMPohSuAosMUYn3VsgX4InqPdDgb_85WBtv9xkE';
// ───────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let map, allReports = [], markers = [], selectedId = null;

// ── INIT MAP ──────────────────────────────────────────────────
function initMap() {
  map = L.map('map').setView([14.8533, 121.0460], 14); // Barangay Quarry coords
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);
}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('auth-error');
  btn.disabled = true; btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
  });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    showApp(data.user);
  }
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function showApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-email').textContent = user.email;
  if (!map) initMap();
  loadReports();
}

// ── LOAD REPORTS ──────────────────────────────────────────────
async function loadReports() {
  const { data, error } = await sb
    .from('reports')
    .select('*, submitter:users(full_name)')
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }
  allReports = data || [];
  applyFilter();
}

function applyFilter() {
  const statusF = document.getElementById('status-filter').value;
  const typeF = document.getElementById('type-filter').value;
  let filtered = allReports;
  if (statusF !== 'all') filtered = filtered.filter(r => r.status === statusF);
  if (typeF !== 'all') filtered = filtered.filter(r => r.type === typeF);
  renderList(filtered);
  renderMap(filtered);
  renderCounts(allReports);
}

// ── RENDER LIST ───────────────────────────────────────────────
function renderList(reports) {
  const el = document.getElementById('report-list');
  if (!reports.length) { el.innerHTML = '<div class="empty">No reports found.</div>'; return; }
  el.innerHTML = reports.map(r => `
    <div class="report-card ${selectedId === r.id ? 'selected' : ''}" onclick="selectReport('${r.id}')">
      <div class="report-card-top">
        <span class="report-card-type">${typeLabel(r.type)}</span>
        <span class="badge badge-${r.status}">${statusLabel(r.status)}</span>
      </div>
      <div class="report-card-desc">${r.description || '—'}</div>
      <div class="report-card-date">${fmtDate(r.created_at)}</div>
    </div>
  `).join('');
}

// ── RENDER MAP ────────────────────────────────────────────────
function renderMap(reports) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  reports.forEach(r => {
    const color = r.status === 'pending' ? '#f59e0b' : r.status === 'in_progress' ? '#3b82f6' : '#10b981';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    const m = L.marker([r.lat, r.lng], { icon }).addTo(map);
    m.on('click', () => selectReport(r.id));
    markers.push(m);
  });
}

// ── RENDER COUNTS ─────────────────────────────────────────────
function renderCounts(reports) {
  const p = reports.filter(r => r.status === 'pending').length;
  const ip = reports.filter(r => r.status === 'in_progress').length;
  const res = reports.filter(r => r.status === 'resolved').length;
  document.getElementById('counts').innerHTML = `
    <div class="count-item"><div class="count-dot" style="background:#f59e0b"></div>${p} pending</div>
    <div class="count-item"><div class="count-dot" style="background:#3b82f6"></div>${ip} in progress</div>
    <div class="count-item"><div class="count-dot" style="background:#10b981"></div>${res} resolved</div>
    <div style="margin-left:auto;color:#94a3b8">${reports.length} total</div>
  `;
}

// ── SELECT + DETAIL ───────────────────────────────────────────
async function selectReport(id) {
  selectedId = id;
  applyFilter(); // re-render list to highlight

  const r = allReports.find(x => x.id === id);
  if (!r) return;

  // Pan map
  map.panTo([r.lat, r.lng]);

  // Load logs
  const { data: logs } = await sb
    .from('status_logs')
    .select()
    .eq('report_id', id)
    .order('changed_at', { ascending: false });

  const logsHtml = (logs || []).length === 0
    ? '<p style="color:#94a3b8;font-size:12px">No updates yet.</p>'
    : (logs || []).map(l => `
        <div class="log-item">
          <span class="log-arrow">${l.old_status || 'created'} → ${l.new_status}</span>
          ${l.note ? `<div>${l.note}</div>` : ''}
          <div style="color:#94a3b8">${fmtDate(l.changed_at)}</div>
        </div>
      `).join('');

  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-content').innerHTML = `
    <h2>${typeLabel(r.type)}</h2>

    ${r.photo_url ? `<img class="detail-photo" src="${r.photo_url}" alt="Report photo" onerror="this.style.display='none'"/>` : ''}

    <div class="detail-row">
      <div class="detail-label">Status</div>
      <div style="margin-top:4px">
        <button class="status-btn btn-pending ${r.status==='pending'?'btn-active':''}" onclick="updateStatus('${r.id}','pending')">Pending</button>
        <button class="status-btn btn-in_progress ${r.status==='in_progress'?'btn-active':''}" onclick="updateStatus('${r.id}','in_progress')">In Progress</button>
        <button class="status-btn btn-resolved ${r.status==='resolved'?'btn-active':''}" onclick="updateStatus('${r.id}','resolved')">Resolved</button>
      </div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Description</div>
      <div class="detail-val">${r.description || '—'}</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Location</div>
      <div class="detail-val" style="font-family:monospace">${r.lat.toFixed(6)}, ${r.lng.toFixed(6)}</div>
      <a href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank" style="font-size:12px;color:#0f766e">Open in Google Maps ↗</a>
    </div>

    <div class="detail-row">
      <div class="detail-label">Submitted</div>
      <div class="detail-val">${fmtDate(r.created_at)}</div>
    </div>

    <div class="detail-row" style="margin-top:16px">
      <div class="detail-label">Status History</div>
      <div style="margin-top:6px">${logsHtml}</div>
    </div>
  `;
  panel.classList.add('open');
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  applyFilter();
}

// ── UPDATE STATUS ─────────────────────────────────────────────
async function updateStatus(reportId, newStatus) {
  const { error } = await sb
    .from('reports')
    .update({ status: newStatus })
    .eq('id', reportId);

  if (error) { alert('Error: ' + error.message); return; }

  // Update local copy
  const r = allReports.find(x => x.id === reportId);
  if (r) r.status = newStatus;

  applyFilter();
  selectReport(reportId); // re-render detail
}

// ── HELPERS ───────────────────────────────────────────────────
function typeLabel(t) {
  return { street_light: 'Street Light', road_damage: 'Road Damage', hazard: 'Hazard', announcement: 'Announcement' }[t] || t;
}
function statusLabel(s) {
  return { pending: 'Pending', in_progress: 'In Progress', resolved: 'Resolved' }[s] || s;
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── AUTO-LOGIN if session exists ──────────────────────────────
(async () => {
  const { data } = await sb.auth.getSession();
  if (data?.session?.user) showApp(data.session.user);
})();
</script>
</body>
</html>
